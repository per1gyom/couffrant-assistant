<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Raya — Panel Société</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/admin-panel.css?v=26">
</head>
<body>

<header class="header">
  <div class="header-left">
    <div class="logo">⚡ Raya <span>//</span> Ma société</div>
    <span class="badge-admin">ADMIN</span>
  </div>
  <div class="header-right">
    <span id="clock"></span>
    <a href="/chat" class="btn-nav">← Chat</a>
    <a href="/logout" class="btn-nav">Déconnexion</a>
  </div>
</header>

<nav class="nav-tabs">
  <div class="tab active" onclick="switchTab('company')">Ma société</div>
  <div class="tab" onclick="switchTab('profile')">Mon profil</div>
</nav>

<main class="main">

<!-- MA SOCIÉTÉ -->
<section id="tab-company" class="section active">
  <div class="actions-row">
    <button class="btn btn-ghost" onclick="loadCompany()">&#8635; Actualiser</button>
    <button class="btn btn-primary" onclick="openModal('create-user')">+ Créer un utilisateur</button>
    <span id="company-count" style="font-family:var(--mono);font-size:12px;color:var(--text3)"></span>
  </div>
  <div id="company-alert" class="alert"></div>
  <div id="company-content"><div style="color:var(--text3);font-family:var(--mono);font-size:12px">Chargement...</div></div>
</section>

<!-- MON PROFIL -->
<section id="tab-profile" class="section">
  <div id="profile-alert" class="alert"></div>
  <div class="profile-card">
    <div class="profile-section-title">📧 Adresse email</div>
    <div class="profile-info">Compte connecté : <strong id="profile-username">—</strong></div>
    <div class="form-group"><label>Email</label><input type="email" id="profile-email" placeholder="votre@email.fr"></div>
    <button class="btn btn-primary" onclick="saveEmail()">Enregistrer l'email</button>
  </div>
  <div class="profile-card">
    <div class="profile-section-title">✏️ Nom d'affichage</div>
    <div class="form-group"><label>Nom d'affichage</label><input type="text" id="profile-display-name" placeholder="ex : Guillaume D." maxlength="80"></div>
    <button class="btn btn-primary" onclick="saveDisplayName()">Enregistrer le nom</button>
  </div>
  <div class="profile-card">
    <div class="profile-section-title">🔗 Mes connexions mail</div>
    <div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:12px">
      <a href="/login" class="btn btn-primary" style="text-decoration:none;display:inline-flex;align-items:center;gap:6px">🔵 Microsoft 365 — Reconnecter</a>
      <a href="/login/gmail" class="btn btn-accent" style="text-decoration:none;display:inline-flex;align-items:center;gap:6px">✉️ Gmail — Reconnecter</a>
    </div>
  </div>
  <div class="profile-card">
    <div class="profile-section-title">🔑 Changer le mot de passe</div>
    <div id="password-alert" class="alert"></div>
    <div class="form-group"><label>Mot de passe actuel</label><input type="password" id="current-password" autocomplete="current-password"></div>
    <div class="form-group"><label>Nouveau mot de passe</label><input type="password" id="new-password" placeholder="12 caract. min" autocomplete="new-password"></div>
    <div class="form-group"><label>Confirmer</label><input type="password" id="confirm-password" autocomplete="new-password"></div>
    <button class="btn btn-warn" onclick="changePassword()">🔒 Mettre à jour</button>
  </div>
</section>

</main>

<!-- MODAL CRÉATION USER (tenant) -->
<div class="modal-overlay" id="modal-create-user">
  <div class="modal">
    <div class="modal-title">Créer un utilisateur</div>
    <div id="create-user-alert" class="alert"></div>
    <div class="form-group"><label>Identifiant</label><input type="text" id="new-username" placeholder="ex: arlene" autocomplete="off"></div>
    <div class="form-group"><label>Email *</label><input type="email" id="new-email" placeholder="prenom@societe.fr" required></div>
    <div class="form-group"><label>Téléphone</label><input type="tel" id="new-phone" placeholder="+33 6 12 34 56 78"></div>
    <div class="form-group"><label>Mot de passe temporaire</label><input type="password" id="new-password-user" placeholder="8 caractères min"></div>
    <div class="form-group"><label>Rôle</label><select id="new-scope"><option value="user">Utilisateur</option><option value="tenant_admin">Admin société</option></select></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('create-user')">Annuler</button>
      <button class="btn btn-primary" onclick="createUser()">Créer</button>
    </div>
  </div>
</div>

<!-- MODAL ÉDITION USER (tenant) -->
<div class="modal-overlay" id="modal-edit-user">
  <div class="modal">
    <div class="modal-title" id="edit-modal-title">Éditer l'utilisateur</div>
    <div id="edit-user-alert" class="alert"></div>
    <div class="form-group"><label>Email</label><input type="email" id="edit-email"></div>
    <div class="form-group"><label>Nom d'affichage</label><input type="text" id="edit-display-name" maxlength="80"></div>
    <div class="form-group"><label>Téléphone</label><input type="tel" id="edit-phone"></div>
    <div class="form-group"><label>Rôle</label><select id="edit-scope"><option value="user">Utilisateur</option><option value="tenant_admin">Admin société</option></select></div>
    <hr class="divider">
    <button class="btn btn-warn" style="width:100%" onclick="resetPassword()">Réinitialiser le mot de passe</button>
    <div id="reset-result"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('edit-user')">Annuler</button>
      <button class="btn btn-primary" onclick="saveUser()">Enregistrer</button>
    </div>
  </div>
</div>

<script>
// ─── TENANT PANEL JS ───────────────────────────────────
// Appelle UNIQUEMENT /tenant/* et /profile — aucun accès /admin/*
let currentEditUser='';

function switchTab(name){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-tabs .tab').forEach(t=>t.classList.remove('active'));
  const sec=document.getElementById('tab-'+name);
  if(sec) sec.classList.add('active');
  event.target.classList.add('active');
  if(name==='company') loadCompany();
  if(name==='profile') loadProfile();
}

function openModal(id){document.getElementById('modal-'+id).classList.add('open');}
function closeModal(id){document.getElementById('modal-'+id).classList.remove('open');}
function setAlert(id,msg,type){const el=document.getElementById(id);if(!el)return;el.textContent=msg;el.className='alert alert-'+type;}

async function loadCompany(){
  try{
    const data=await(await fetch('/tenant/my-overview')).json();
    if(!data||!data.length){document.getElementById('company-content').innerHTML='<p>Aucune donnée.</p>';return;}
    const t=data[0];
    const count=document.getElementById('company-count');
    if(count) count.textContent=`${t.user_count} utilisateur(s) · ${t.total_conv} conv · ${t.total_mails} mails`;
    let html=`<div class="section-title">${t.name||t.tenant_id}</div>`;
    html+='<div class="table-wrap"><table><thead><tr><th>Utilisateur</th><th>Email</th><th>Rôle</th><th>Dernière connexion</th><th>Actions</th></tr></thead><tbody>';
    (t.users||[]).forEach(u=>{
      html+=`<tr>
        <td><strong>${u.username}</strong>${u.suspended?' <span style="color:var(--red)">⏸</span>':''}</td>
        <td>${u.email||'—'}</td>
        <td><span class="badge ${u.scope==='tenant_admin'?'badge-green':'badge-gray'}">${u.scope||'user'}</span></td>
        <td style="font-family:var(--mono);font-size:11px">${u.last_login?u.last_login.split('T')[0]:'jamais'}</td>
        <td>
          <button class="btn btn-accent" style="padding:4px 9px;font-size:11px" onclick="editUser('${u.username}','${u.email||''}','${u.scope||'user'}','${u.phone||''}')">Modifier</button>
        </td>
      </tr>`;
    });
    html+='</tbody></table></div>';
    document.getElementById('company-content').innerHTML=html;
  }catch(e){document.getElementById('company-content').innerHTML='<p style="color:var(--red)">Erreur de chargement.</p>';}
}

async function loadProfile(){
  try{
    const d=await(await fetch('/profile')).json();
    document.getElementById('profile-username').textContent=d.username||'—';
    document.getElementById('profile-email').value=d.email||'';
  }catch(e){}
}

async function createUser(){
  const username=document.getElementById('new-username').value.trim();
  const email=document.getElementById('new-email').value.trim();
  const phone=document.getElementById('new-phone').value.trim();
  const password=document.getElementById('new-password-user').value;
  const scope=document.getElementById('new-scope').value;
  if(!username||!password){setAlert('create-user-alert','Identifiant et mot de passe requis.','err');return;}
  const d=await(await fetch('/tenant/create-user',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,password,email,phone:phone||null,scope})})).json();
  if(d.status==='ok'){closeModal('create-user');loadCompany();}
  else setAlert('create-user-alert','❌ '+(d.message||d.error),'err');
}

function editUser(username,email,scope,phone){
  currentEditUser=username;
  document.getElementById('edit-modal-title').textContent='Éditer — '+username;
  document.getElementById('edit-email').value=email;
  document.getElementById('edit-scope').value=scope;
  document.getElementById('edit-phone').value=phone;
  document.getElementById('edit-display-name').value='';
  openModal('edit-user');
}

async function saveUser(){
  const email=document.getElementById('edit-email').value.trim();
  const scope=document.getElementById('edit-scope').value;
  const phone=document.getElementById('edit-phone').value.trim();
  const d=await(await fetch(`/tenant/update-user/${currentEditUser}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,scope,phone:phone||null})})).json();
  if(d.status==='ok'){closeModal('edit-user');loadCompany();}
  else setAlert('edit-user-alert','❌ '+(d.message||d.error),'err');
}

async function resetPassword(){
  const d=await(await fetch(`/tenant/reset-password/${currentEditUser}`,{method:'POST'})).json();
  document.getElementById('reset-result').innerHTML=d.status==='ok'?`<div style="margin-top:8px;font-size:12px;color:var(--green)">✅ Lien : <code>${d.reset_url||''}</code></div>`:`<div style="color:var(--red)">❌ ${d.message||''}</div>`;
}

async function saveEmail(){
  const email=document.getElementById('profile-email').value.trim();
  const d=await(await fetch('/profile/email',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({email})})).json();
  setAlert('profile-alert',d.status==='ok'?'✅ Email mis à jour.':'❌ '+(d.message||d.error),d.status==='ok'?'ok':'err');
  setTimeout(()=>{document.getElementById('profile-alert').className='alert';},4000);
}

async function saveDisplayName(){
  const name=document.getElementById('profile-display-name').value.trim();
  const d=await(await fetch('/profile/display-name',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({display_name:name})})).json();
  setAlert('profile-alert',d.status==='ok'?'✅ Nom mis à jour.':'❌ '+(d.message||d.error),d.status==='ok'?'ok':'err');
  setTimeout(()=>{document.getElementById('profile-alert').className='alert';},4000);
}

async function changePassword(){
  const current=document.getElementById('current-password').value;
  const newPwd=document.getElementById('new-password').value;
  const confirm=document.getElementById('confirm-password').value;
  if(!current||!newPwd||!confirm){setAlert('password-alert','Tous les champs sont requis.','err');return;}
  if(newPwd!==confirm){setAlert('password-alert','Les mots de passe ne correspondent pas.','err');return;}
  const d=await(await fetch('/profile/password',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({current_password:current,new_password:newPwd})})).json();
  if(d.status==='ok'){
    setAlert('password-alert','✅ Mot de passe mis à jour.','ok');
    ['current-password','new-password','confirm-password'].forEach(id=>document.getElementById(id).value='');
  } else setAlert('password-alert','❌ '+(d.message||d.error),'err');
  setTimeout(()=>{document.getElementById('password-alert').className='alert';},5000);
}

// Horloge
function updateClock(){const n=new Date();document.getElementById('clock').textContent=n.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});}
setInterval(updateClock,30000);updateClock();

// Fermeture modals
document.addEventListener('keydown',e=>{if(e.key==='Escape')document.querySelectorAll('.modal-overlay.open').forEach(m=>m.classList.remove('open'));});
document.querySelectorAll('.modal-overlay').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('open');}));

// Init
loadCompany();
loadProfile();
</script>
</body>
</html>
