<body>
<div class="app">
  <div class="token-banner" id="tokenBanner"></div>
  <div class="main-layout">
    <!-- SIDEBAR -->
    <div class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:6px">
          <div class="logo">
            <div class="logo-dot" id="msStatus" title="Connexion"></div>
            <span class="logo-username" id="logoUserName"></span>
          </div>
          <button class="sidebar-collapse-btn" onclick="document.getElementById('sidebar').classList.toggle('collapsed')" title="Replier/Déplier" style="flex-shrink:0">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
          </button>
        </div>
      </div>
      <details class="sidebar-details" id="topicsSidebarSection" open>
        <summary class="sidebar-section-title">Mes sujets</summary>
        <div id="topicsSidebarList"></div>
      </details>
      <details class="sidebar-details">
        <summary class="sidebar-section-title">Raccourcis</summary>
        <div class="quick-row" id="quickRow"></div>
      </details>
      <div class="sidebar-footer">
        <div class="dotmenu-wrap">
          <button class="dotmenu-btn" onclick="this.parentElement.classList.toggle('open')" title="Menu">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="5" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="12" cy="19" r="2"/></svg>
          </button>
          <div class="dotmenu-dropdown">
            <button class="dotmenu-item" id="dotmenuAutoSpeak" onclick="quickToggleAutoSpeak(event)" style="display:flex;align-items:center;gap:8px;width:100%">
              <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="dotmenuAutoSpeakIcon"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>
              <span id="dotmenuAutoSpeakLabel" style="flex:1;text-align:left">Lecture auto</span>
              <span id="dotmenuAutoSpeakSwitch" style="display:inline-block;width:32px;height:18px;border-radius:9px;background:var(--text-muted);position:relative;transition:background .18s ease;flex-shrink:0">
                <span id="dotmenuAutoSpeakKnob" style="position:absolute;top:2px;left:2px;width:14px;height:14px;background:#fff;border-radius:50%;transition:transform .18s ease;box-shadow:0 1px 2px rgba(0,0,0,.2)"></span>
              </span>
            </button>
            <div class="dotmenu-sep"></div>
            <a class="dotmenu-item" href="/settings"><svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg> Paramètres</a>
            <a class="dotmenu-item" href="/tenant/panel" id="adminPanelBtn" style="display:none"><svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg> Ma société</a>
            <a class="dotmenu-item" href="/admin/panel" id="superAdminBtn" style="display:none"><svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg> Super Admin</a>
            <div class="dotmenu-sep"></div>
            <a class="dotmenu-item danger" href="/logout"><svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg> Déconnexion</a>
          </div>
        </div>
      </div>
    </div>
    <!-- CHAT -->
    <div class="chat-column">
      <button class="sidebar-expand-btn" onclick="document.getElementById('sidebar').classList.remove('collapsed')" title="Afficher le menu">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
      </button>
      <div class="messages-wrap">
        <div class="messages" id="messages">
          <div class="welcome" id="welcomeMsg">
            <div class="welcome-icon">&#10022;</div>
            <h2 id="welcomeTitle">Bonjour !</h2>
            <p>Je suis Raya, ton assistante personnelle.<br>Je surveille tes mails, ton agenda et ton activite.</p>
          </div>
        </div>
        <button class="scroll-down-btn" id="scrollDownBtn" onclick="scrollToBottom()" title="Defiler vers le bas">&#8595;</button>
      </div>
      <div class="triage-bar" id="triageBar">
        <button class="triage-action triage-skip" onclick="handleTriage('skip')">&#9197; Passer</button>
        <button class="triage-action triage-archive" onclick="handleTriage('archive')">&#128193; Archiver</button>
        <button class="triage-action triage-delete" onclick="handleTriage('delete')">&#128465; Corbeille</button>
        <button class="triage-action triage-reply" onclick="handleTriage('reply')">&#9993;&#65039; Repondre</button>
      </div>
      <div class="input-zone">
        <div class="attachment-preview" id="attachmentPreview">
          <span id="attachmentName">Aucun fichier</span>
          <button class="attachment-remove" onclick="removeAttachment()">&#10005;</button>
        </div>
        <div class="input-wrapper" id="inputWrapper">
          <textarea id="input" placeholder="Envoie un message a Raya..." rows="1" oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
          <div class="input-btns">
            <button class="icon-btn" id="attachBtn" onclick="document.getElementById('fileInput').click()" title="Joindre"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg></button>
            <button class="icon-btn" id="micBtn" onclick="toggleMic()" title="Dicter"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 2a3 3 0 00-3 3v7a3 3 0 006 0V5a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/></svg></button>
            <button class="icon-btn" id="sendBtn" onclick="sendMessage()"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button>
          </div>
        </div>
        <div class="mic-status" id="micStatus">&#127913; En ecoute... parle, je t'entends</div>
        <input type="file" id="fileInput" accept="image/*,.pdf" onchange="handleFileSelect(event)">
      </div>
    </div>
  </div>
</div>

<div id="toast-container"></div>

<!-- MODAL RACCOURCI -->
<div class="modal-overlay" id="modalShortcutEdit">
  <div class="modal size-standard">
    <div class="modal-head">
      <div class="modal-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="13 2 13 9 20 9"/><path d="M20 13v7a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h7"/></svg>
      </div>
      <div class="modal-title-wrap">
        <div class="modal-title" id="shortcutEditTitle">Raccourci</div>
        <div class="modal-subtitle">Personnalise le titre, le prompt et la couleur</div>
      </div>
      <button class="modal-close" aria-label="Fermer">×</button>
    </div>
    <div class="modal-body">
      <div class="modal-field">
        <label class="modal-label">Titre (affiche dans la sidebar)</label>
        <input type="text" id="shortcutEditLabel" class="modal-input" placeholder="ex: Mails urgents" maxlength="100">
      </div>
      <div class="modal-field">
        <label class="modal-label">Prompt envoye a Raya</label>
        <textarea id="shortcutEditPrompt" class="modal-textarea" placeholder="ex: Fais un tri complet de mes mails non lus..." maxlength="2000"></textarea>
      </div>
      <div class="modal-field">
        <label class="modal-label">Couleur</label>
        <div id="shortcutColorPicker" class="color-picker-row"></div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="m-btn m-btn-ghost" onclick="closeShortcutEdit()">Annuler</button>
      <button class="m-btn m-btn-primary" onclick="saveShortcutEdit()">Enregistrer</button>
    </div>
  </div>
</div>

  <div class="onboarding-modal">

      <button class="onb-skip" onclick="skipOnboarding()">Passer pour l'instant &#8594;</button>
    </div>
    <div id="onboardingContent"></div>

<script>
  // ─── TOGGLE RAPIDE LECTURE AUTO (menu 3 points) ───
  // Icones en dur pour eviter d'ecrire du SVG complet dans le JS a chaque fois
  const _ICON_SPEAK_ON = '<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 010 7.07"/><path d="M19.07 4.93a10 10 0 010 14.14"/>';
  const _ICON_SPEAK_OFF = '<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/>';

  function syncDotmenuAutoSpeakUI() {
    const icon = document.getElementById('dotmenuAutoSpeakIcon');
    const label = document.getElementById('dotmenuAutoSpeakLabel');
    const sw = document.getElementById('dotmenuAutoSpeakSwitch');
    const knob = document.getElementById('dotmenuAutoSpeakKnob');
    if (!icon || !label || !sw || !knob) return;
    // autoSpeak est defini dans chat-core.js (variable globale)
    const on = (typeof autoSpeak !== 'undefined' && autoSpeak === true);
    icon.innerHTML = on ? _ICON_SPEAK_ON : _ICON_SPEAK_OFF;
    label.textContent = 'Lecture auto';
    // Animation du switch : vert + knob a droite quand ON, gris + knob a gauche quand OFF
    sw.style.background = on ? 'var(--accent)' : 'var(--text-muted)';
    knob.style.transform = on ? 'translateX(14px)' : 'translateX(0)';
  }

  async function quickToggleAutoSpeak(event) {
    event?.stopPropagation();
    // Inverse la valeur JS en memoire
    if (typeof autoSpeak === 'undefined') window.autoSpeak = false;
    autoSpeak = !autoSpeak;
    syncDotmenuAutoSpeakUI();
    // Persistance DB : PUT /profile/settings (meme endpoint que /settings)
    try {
      await fetch('/profile/settings', {
        method: 'PUT',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({settings: {auto_speak: autoSpeak}}),
      });
      if (typeof showToast === 'function') {
        showToast(autoSpeak ? 'Lecture auto activée' : 'Lecture auto désactivée', 'ok', 2000);
      }
    } catch (e) {
      console.warn('Failed to save auto_speak:', e);
    }
    // Si on desactive pendant une lecture en cours, on la coupe
    if (!autoSpeak && typeof stopSpeech === 'function') stopSpeech();
  }

  // Synchro au chargement (une fois que chat-core.js a fait loadUserInfo qui met autoSpeak a jour)
  window.addEventListener('load', () => {
    setTimeout(syncDotmenuAutoSpeakUI, 800);  // petit delai pour laisser loadUserInfo finir
  });


  document.addEventListener('click', e => {
    const wrap = document.querySelector('.dotmenu-wrap');
    if (wrap && !wrap.contains(e.target)) wrap.classList.remove('open');
  });
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistrations().then(regs => regs.forEach(reg => reg.unregister()));
    caches.keys().then(keys => keys.forEach(k => caches.delete(k)));
  }
  if (typeof marked === 'undefined' && !sessionStorage.getItem('raya_reloaded')) {
    sessionStorage.setItem('raya_reloaded', '1');
    location.reload();
  } else {
    sessionStorage.removeItem('raya_reloaded');
  }
  (function(){
    const params = new URLSearchParams(window.location.search);
    if(params.get('gmail_connected')==='1'){
      window.history.replaceState({}, '', '/chat');
      setTimeout(()=>{ if(typeof showToast === 'function') showToast('Gmail connecte avec succes !'); }, 800);
    }
    if(params.get('gmail_error')){
      window.history.replaceState({}, '', '/chat');
      setTimeout(()=>{ if(typeof showToast === 'function') showToast('Connexion Gmail refusee : ' + params.get('gmail_error')); }, 800);
    }
  })();
</script>
