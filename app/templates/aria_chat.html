<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Aria — Couffrant Solar</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0a; --surface: #141414; --surface2: #1e1e1e;
    --border: #2a2a2a; --text: #e8e8e8; --text-muted: #888;
    --accent: #6366f1; --accent-hover: #5558e8;
    --user-bg: #1e1e2e; --aria-bg: #141414;
    --danger: #ef4444; --success: #22c55e;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 15px; line-height: 1.6; }
  .app { display: flex; flex-direction: column; height: 100vh; max-width: 800px; margin: 0 auto; }
  .header { display: flex; align-items: center; gap: 12px; padding: 14px 20px; border-bottom: 1px solid var(--border); background: var(--surface); flex-shrink: 0; }
  .header-dot { width: 8px; height: 8px; background: var(--success); border-radius: 50%; animation: pulse 2s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  .header-title { font-weight: 600; font-size: 16px; }
  .header-sub { font-size: 12px; color: var(--text-muted); margin-left: auto; }
  .quick-actions { display: flex; gap: 8px; padding: 10px 20px; overflow-x: auto; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; scrollbar-width: none; }
  .quick-actions::-webkit-scrollbar { display: none; }
  .quick-btn { flex-shrink: 0; background: var(--surface2); border: 1px solid var(--border); color: var(--text-muted); border-radius: 20px; padding: 5px 14px; font-size: 13px; cursor: pointer; white-space: nowrap; transition: all 0.15s; }
  .quick-btn:hover { border-color: var(--accent); color: var(--text); }
  .messages { flex: 1; overflow-y: auto; padding: 24px 20px; display: flex; flex-direction: column; gap: 20px; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
  .message-row { display: flex; gap: 12px; align-items: flex-start; }
  .message-row.user { flex-direction: row-reverse; }
  .avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; margin-top: 2px; }
  .avatar.aria-avatar { background: var(--accent); }
  .avatar.user-avatar { background: var(--surface2); border: 1px solid var(--border); }
  .bubble { max-width: 75%; border-radius: 16px; padding: 12px 16px; font-size: 14.5px; line-height: 1.65; }
  .message-row.aria .bubble { background: var(--aria-bg); border: 1px solid var(--border); border-radius: 4px 16px 16px 16px; }
  .message-row.user .bubble { background: var(--user-bg); border: 1px solid #2d2d4a; border-radius: 16px 4px 16px 16px; color: #c8c8f0; }
  .bubble-actions { display: flex; gap: 8px; margin-top: 8px; }
  .speak-btn { background: none; border: 1px solid var(--border); color: var(--text-muted); border-radius: 20px; padding: 3px 10px; font-size: 12px; cursor: pointer; transition: all 0.15s; }
  .speak-btn:hover { border-color: var(--accent); color: var(--text); }
  .speak-btn.playing { border-color: var(--accent); color: var(--accent); }
  .loading-bubble { display: flex; gap: 5px; padding: 14px 16px; align-items: center; }
  .dot-anim { width: 7px; height: 7px; background: var(--text-muted); border-radius: 50%; animation: dotbounce 1.2s infinite; }
  .dot-anim:nth-child(2) { animation-delay: 0.2s; }
  .dot-anim:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dotbounce { 0%, 80%, 100% { transform: scale(0.7); opacity: 0.5; } 40% { transform: scale(1); opacity: 1; } }
  .triage-bar { display: none; gap: 8px; padding: 10px 20px; background: var(--surface); border-top: 1px solid var(--border); justify-content: center; flex-shrink: 0; }
  .triage-bar.visible { display: flex; }
  .triage-action { padding: 7px 16px; border-radius: 20px; font-size: 13px; font-weight: 500; cursor: pointer; border: none; transition: opacity 0.15s; }
  .triage-action:hover { opacity: 0.85; }
  .triage-skip { background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border); }
  .triage-archive { background: #1e3a2e; color: #4ade80; }
  .triage-delete { background: #3a1e1e; color: #f87171; }
  .triage-reply { background: #1e2a3a; color: #60a5fa; }
  .input-zone { padding: 16px 20px 20px; background: var(--surface); border-top: 1px solid var(--border); flex-shrink: 0; }
  .input-wrapper { display: flex; align-items: flex-end; gap: 10px; background: var(--surface2); border: 1px solid var(--border); border-radius: 16px; padding: 8px 8px 8px 16px; transition: border-color 0.15s; }
  .input-wrapper:focus-within { border-color: var(--accent); }
  .input-wrapper.mic-active { border-color: var(--danger); }
  textarea#input { flex: 1; background: none; border: none; outline: none; color: var(--text); font-size: 14.5px; font-family: inherit; resize: none; min-height: 24px; max-height: 120px; line-height: 1.5; padding: 4px 0; }
  textarea#input::placeholder { color: var(--text-muted); }
  textarea#input.interim { color: #888; font-style: italic; }
  .input-btns { display: flex; gap: 6px; align-items: flex-end; padding-bottom: 2px; }
  .icon-btn { width: 36px; height: 36px; border-radius: 10px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; transition: all 0.15s; flex-shrink: 0; }
  #micBtn { background: var(--surface); color: var(--text-muted); border: 1px solid var(--border); }
  #micBtn:hover { border-color: var(--accent); color: var(--text); }
  #micBtn.listening { background: var(--danger); color: white; border-color: var(--danger); animation: micpulse 1s infinite; }
  @keyframes micpulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.4); } 50% { box-shadow: 0 0 0 6px rgba(239,68,68,0); } }
  #sendBtn { background: var(--accent); color: white; border: none; }
  #sendBtn:hover { background: var(--accent-hover); }
  #sendBtn:disabled { opacity: 0.4; cursor: not-allowed; }
  .mic-status { display: none; font-size: 12px; color: var(--danger); margin-top: 6px; text-align: center; }
  .mic-status.visible { display: block; }
  #stopBtn { display: none; position: fixed; bottom: 90px; right: 20px; background: var(--surface2); border: 1px solid var(--border); color: var(--text-muted); border-radius: 20px; padding: 6px 14px; font-size: 13px; cursor: pointer; z-index: 100; }
  #stopBtn.visible { display: block; }
  .welcome { text-align: center; padding: 40px 20px; color: var(--text-muted); }
  .welcome-icon { font-size: 40px; margin-bottom: 16px; }
  .welcome h2 { font-size: 20px; font-weight: 600; color: var(--text); margin-bottom: 8px; }
  .welcome p { font-size: 14px; max-width: 400px; margin: 0 auto; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-dot"></div>
    <div class="header-title">Aria</div>
    <div class="header-sub">Couffrant Solar</div>
  </div>
  <div class="quick-actions">
    <button class="quick-btn" onclick="quickAsk('Quels sont mes mails urgents ?')">📬 Mails urgents</button>
    <button class="quick-btn" onclick="quickAsk('Quel est mon planning aujourd\'hui ?')">📅 Planning</button>
    <button class="quick-btn" onclick="quickAsk('Donne-moi un point sur mes chantiers en cours')">⚡ Chantiers</button>
    <button class="quick-btn" onclick="quickAsk('Fais-moi un point de la semaine')">📊 Point semaine</button>
    <button class="quick-btn" onclick="quickAsk('Quelles sont mes relances en attente ?')">🔔 Relances</button>
    <button class="quick-btn" onclick="startTriage()">📋 Trier mes mails</button>
  </div>
  <div class="messages" id="messages">
    <div class="welcome">
      <div class="welcome-icon">✦</div>
      <h2>Bonjour Guillaume</h2>
      <p>Je suis Aria, ton assistante Couffrant Solar.<br>Je surveille tes mails, tes chantiers et ton activité.</p>
    </div>
  </div>
  <div class="triage-bar" id="triageBar">
    <button class="triage-action triage-skip" onclick="handleTriage('skip')">⏭ Passer</button>
    <button class="triage-action triage-archive" onclick="handleTriage('archive')">📁 Archiver</button>
    <button class="triage-action triage-delete" onclick="handleTriage('delete')">🗑 Corbeille</button>
    <button class="triage-action triage-reply" onclick="handleTriage('reply')">✉️ Répondre</button>
  </div>
  <div class="input-zone">
    <div class="input-wrapper" id="inputWrapper">
      <textarea id="input" placeholder="Envoie un message à Aria…" rows="1" oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
      <div class="input-btns">
        <button class="icon-btn" id="micBtn" onclick="toggleMic()" title="Dicter">🎤</button>
        <button class="icon-btn" id="sendBtn" onclick="sendMessage()">➤</button>
      </div>
    </div>
    <div class="mic-status" id="micStatus">🎙 En écoute… parle, je t'entends</div>
  </div>
</div>
<button id="stopBtn" onclick="stopSpeech()">⏹ Arrêter</button>
<script>
const messagesEl=document.getElementById('messages');
const inputEl=document.getElementById('input');
const sendBtn=document.getElementById('sendBtn');
const micBtn=document.getElementById('micBtn');
const stopBtn=document.getElementById('stopBtn');
const triageBar=document.getElementById('triageBar');
const micStatus=document.getElementById('micStatus');
const inputWrapper=document.getElementById('inputWrapper');
let isListening=false,currentAudio=null,speakAborted=false,currentSpeakBtn=null;
let triageQueue=[],triageCurrent=null,silenceTimer=null;
let interimText='', finalTextBase='';

// ─── TTS ───
function speak(text,btn){
  stopSpeech();speakAborted=false;stopBtn.classList.add('visible');
  currentSpeakBtn=btn||null;
  if(currentSpeakBtn){currentSpeakBtn.textContent='⏹ Stop';currentSpeakBtn.classList.add('playing');}
  fetch('/speak',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text})})
  .then(r=>r.ok?r.blob():Promise.reject())
  .then(blob=>{
    if(speakAborted||blob.size<100){resetSpeakUI();return;}
    const url=URL.createObjectURL(blob);currentAudio=new Audio(url);
    currentAudio.onended=resetSpeakUI;currentAudio.onerror=resetSpeakUI;
    if(!speakAborted)currentAudio.play().catch(resetSpeakUI);
  }).catch(resetSpeakUI);
}
function resetSpeakUI(){
  stopBtn.classList.remove('visible');
  if(currentSpeakBtn){currentSpeakBtn.textContent='🔊 Écouter';currentSpeakBtn.classList.remove('playing');currentSpeakBtn=null;}
}
function stopSpeech(){
  speakAborted=true;
  if(currentAudio){currentAudio.pause();currentAudio=null;}
  window.speechSynthesis&&window.speechSynthesis.cancel();
  resetSpeakUI();
}
function cleanText(text){
  return text.replace(/#{1,6}\s+/g,'').replace(/\*\*(.*?)\*\*/g,'$1').replace(/\*(.*?)\*/g,'$1')
    .replace(/`(.*?)`/g,'$1').replace(/---+/g,'').replace(/\|.*?\|/g,'')
    .replace(/^\s*[-•]\s/gm,'').replace(/\[([^\]]+)\]\([^\)]+\)/g,'$1')
    .replace(/✔️|\u274c|📧/g,'').replace(/\n{3,}/g,'\n\n').trim();
}
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px';}
function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}}
function scrollToBottom(){messagesEl.scrollTop=messagesEl.scrollHeight;}

// ─── MESSAGES ───
function addMessage(text,type){
  const welcome=messagesEl.querySelector('.welcome');if(welcome)welcome.remove();
  const row=document.createElement('div');row.className='message-row '+type;
  const avatar=document.createElement('div');avatar.className='avatar '+type+'-avatar';
  avatar.textContent=type==='aria'?'✦':'G';
  const bubble=document.createElement('div');bubble.className='bubble';
  const content=document.createElement('div');content.style.whiteSpace='pre-wrap';
  content.textContent=type==='aria'?cleanText(text):text;bubble.appendChild(content);
  if(type==='aria'){
    const actions=document.createElement('div');actions.className='bubble-actions';
    const speakBtn=document.createElement('button');speakBtn.className='speak-btn';speakBtn.textContent='🔊 Écouter';
    speakBtn.onclick=()=>{if(speakBtn.classList.contains('playing'))stopSpeech();else speak(text,speakBtn);};
    actions.appendChild(speakBtn);bubble.appendChild(actions);
  }
  row.appendChild(avatar);row.appendChild(bubble);messagesEl.appendChild(row);scrollToBottom();return row;
}
function addLoading(){
  const row=document.createElement('div');row.className='message-row aria';
  const avatar=document.createElement('div');avatar.className='avatar aria-avatar';avatar.textContent='✦';
  const bubble=document.createElement('div');bubble.className='bubble loading-bubble';
  bubble.innerHTML='<div class="dot-anim"></div><div class="dot-anim"></div><div class="dot-anim"></div>';
  row.appendChild(avatar);row.appendChild(bubble);messagesEl.appendChild(row);scrollToBottom();return row;
}
async function sendMessage(){
  const text=inputEl.value.trim();if(!text)return;
  inputEl.value='';inputEl.style.height='auto';inputEl.classList.remove('interim');
  sendBtn.disabled=true;stopSpeech();
  addMessage(text,'user');const loading=addLoading();
  try{
    const response=await fetch('/aria',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({query:text})});
    const data=await response.json();loading.remove();
    const msgRow=addMessage(data.answer,'aria');speak(data.answer,msgRow.querySelector('.speak-btn'));
  }catch{loading.remove();addMessage('Erreur de connexion à Aria. Réessayez.','aria');}
  sendBtn.disabled=false;
}
function quickAsk(text){inputEl.value=text;sendMessage();}

// ─── MICRO — version robuste ───
function toggleMic(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){
    alert('Reconnaissance vocale non supportée sur ce navigateur.\nUtilisez Chrome ou Edge.');
    return;
  }
  if(isListening){stopListening();}else{startListening();}
}

function startListening(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR)return;

  // Réinitialise les textes
  finalTextBase=inputEl.value;
  interimText='';

  const rec=new SR();
  rec.lang='fr-FR';
  rec.continuous=false;      // false = plus fiable cross-browser
  rec.interimResults=true;
  rec.maxAlternatives=1;

  rec.onstart=()=>{
    isListening=true;
    micBtn.classList.add('listening');
    micBtn.textContent='⏹';
    micStatus.classList.add('visible');
    inputWrapper.classList.add('mic-active');
  };

  rec.onresult=(e)=>{
    clearSilenceTimer();
    let interim='';
    let final='';
    for(let i=e.resultIndex;i<e.results.length;i++){
      if(e.results[i].isFinal){
        final+=e.results[i][0].transcript+' ';
      }else{
        interim+=e.results[i][0].transcript;
      }
    }
    if(interim){
      // Affiche en italique grisé dans le champ
      inputEl.value=(finalTextBase+' '+interim).trim();
      inputEl.classList.add('interim');
      autoResize(inputEl);
    }
    if(final){
      finalTextBase=(finalTextBase+' '+final).trim();
      inputEl.value=finalTextBase;
      inputEl.classList.remove('interim');
      autoResize(inputEl);
    }
    resetSilenceTimer();
  };

  rec.onerror=(e)=>{
    console.error('[Mic] Erreur:', e.error);
    if(e.error==='not-allowed'||e.error==='permission-denied'){
      alert('Microphone bloqué.\nCliquez sur l\'icône 🔒 dans la barre d\'adresse et autorisez le microphone.');
    } else if(e.error==='no-speech'){
      // Silence détecté — on relance si toujours en écoute
    } else if(e.error==='network'){
      alert('Erreur réseau pour la reconnaissance vocale.');
      stopListening();
    }
  };

  rec.onend=()=>{
    if(isListening){
      // Crée une NOUVELLE instance pour relancer (on ne peut pas réutiliser la même)
      setTimeout(()=>{
        if(isListening)startListening();
      },100);
    }else{
      cleanupMicUI();
    }
  };

  try{
    rec.start();
    resetSilenceTimer();
  }catch(e){
    console.error('[Mic] Impossible de démarrer:', e);
    stopListening();
  }
}

function resetSilenceTimer(){
  clearSilenceTimer();
  silenceTimer=setTimeout(()=>{
    if(isListening)stopListening();
  },3000);
}
function clearSilenceTimer(){
  if(silenceTimer){clearTimeout(silenceTimer);silenceTimer=null;}
}
function stopListening(){
  isListening=false;
  clearSilenceTimer();
  cleanupMicUI();
  // Nettoie le texte interim si présent
  inputEl.classList.remove('interim');
  if(inputEl.value)autoResize(inputEl);
  inputEl.focus();
}
function cleanupMicUI(){
  micBtn.classList.remove('listening');
  micBtn.textContent='🎤';
  micStatus.classList.remove('visible');
  inputWrapper.classList.remove('mic-active');
}

// ─── TRIAGE ───
async function startTriage(){
  stopSpeech();triageBar.classList.remove('visible');
  const loading=addLoading();
  const response=await fetch('/triage-queue');const data=await response.json();loading.remove();
  triageQueue=data.mails||[];
  if(triageQueue.length===0){const row=addMessage('Aucun mail.','aria');speak('Aucun mail.',row.querySelector('.speak-btn'));return;}
  const intro=triageQueue.length+' mails. On commence.';
  const introRow=addMessage(intro,'aria');speak(intro,introRow.querySelector('.speak-btn'));
  setTimeout(()=>nextTriage(),1500);
}
function nextTriage(){
  if(triageQueue.length===0){
    triageBar.classList.remove('visible');
    const row=addMessage('Triage terminé !','aria');
    speak('Triage terminé !',row.querySelector('.speak-btn'));
    triageCurrent=null;return;
  }
  triageCurrent=triageQueue.shift();
  const msg='De : '+(triageCurrent.from_email||'Inconnu')+'\nSujet : '+(triageCurrent.subject||'(Sans objet)')+'\n\n'+(triageCurrent.raw_body_preview||'').slice(0,200)+'\n\n— Que je fasse ? ('+triageQueue.length+' restants)';
  const row=addMessage(msg,'aria');speak(msg,row.querySelector('.speak-btn'));
  triageBar.classList.add('visible');
}
async function handleTriage(action){
  if(!triageCurrent)return;triageBar.classList.remove('visible');stopSpeech();
  if(action==='skip'){addMessage('Passé.','aria');setTimeout(()=>nextTriage(),500);return;}
  const actionMap={
    'archive':'Archive le mail '+triageCurrent.message_id,
    'delete':'Supprime (corbeille) le mail '+triageCurrent.message_id,
    'reply':'Prépare une réponse pour le mail '+triageCurrent.message_id
  };
  const loading=addLoading();
  try{
    const response=await fetch('/aria',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({query:actionMap[action]})});
    const data=await response.json();loading.remove();
    const row=addMessage(data.answer,'aria');speak(data.answer,row.querySelector('.speak-btn'));
  }catch{loading.remove();}
  setTimeout(()=>nextTriage(),3000);
}
</script>
</body>
</html>
