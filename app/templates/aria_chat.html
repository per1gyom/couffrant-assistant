<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Aria">
    <title>Aria — Couffrant Solar</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0a0a;
            color: #f0f0f0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            background: #111;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #222;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .header-dot {
            width: 10px;
            height: 10px;
            background: #00c853;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        .header-title { font-size: 18px; font-weight: 600; color: #fff; }
        .header-sub { font-size: 12px; color: #666; margin-left: auto; }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.5;
            white-space: pre-wrap;
        }
        .message.aria {
            background: #1a1a2e;
            border: 1px solid #2a2a4a;
            color: #e0e0ff;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }
        .message.user {
            background: #1e3a5f;
            color: #e0f0ff;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .message.loading {
            background: #1a1a2e;
            border: 1px solid #2a2a4a;
            color: #666;
            align-self: flex-start;
        }
        .dots span { animation: blink 1.4s infinite; font-size: 20px; }
        .dots span:nth-child(2) { animation-delay: 0.2s; }
        .dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink {
            0%, 80%, 100% { opacity: 0; }
            40% { opacity: 1; }
        }
        .input-area {
            background: #111;
            border-top: 1px solid #222;
            padding: 12px 16px;
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }
        .input-wrap {
            flex: 1;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 24px;
            display: flex;
            align-items: center;
            padding: 8px 16px;
            gap: 8px;
        }
        textarea {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            color: #f0f0f0;
            font-size: 15px;
            resize: none;
            max-height: 120px;
            font-family: inherit;
            line-height: 1.4;
        }
        textarea::placeholder { color: #555; }
        .btn-mic {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            background: #333;
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
            transition: background 0.2s;
        }
        .btn-mic.listening {
            background: #c62828;
            animation: pulse-red 1s infinite;
        }
        @keyframes pulse-red {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        .btn-send {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            background: #1565c0;
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
            transition: background 0.2s;
        }
        .btn-send:hover { background: #1976d2; }
        .btn-send:disabled { background: #333; cursor: not-allowed; }
        .quick-actions {
            display: flex;
            gap: 8px;
            padding: 8px 16px;
            overflow-x: auto;
            background: #111;
        }
        .quick-btn {
            background: #1a1a2e;
            border: 1px solid #2a2a4a;
            color: #a0a0ff;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.2s;
        }
        .quick-btn:hover { background: #2a2a4e; }
        .speak-btn {
            background: none;
            border: none;
            color: #555;
            cursor: pointer;
            font-size: 13px;
            padding: 4px 8px;
            border-radius: 8px;
            margin-top: 6px;
            display: block;
        }
        .speak-btn:hover { color: #888; }
        .stop-btn {
            position: fixed;
            bottom: 90px;
            right: 16px;
            background: #c62828;
            color: white;
            border: none;
            border-radius: 50%;
            width: 52px;
            height: 52px;
            font-size: 22px;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
            box-shadow: 0 2px 12px rgba(198,40,40,0.5);
        }
        .stop-btn.visible { display: flex; }
    </style>
</head>
<body>

<div class="header">
    <div class="header-dot"></div>
    <div class="header-title">Aria</div>
    <div class="header-sub">Couffrant Solar</div>
</div>

<div class="quick-actions">
    <button class="quick-btn" onclick="quickAsk('Quels sont mes mails urgents ?')">📬 Mails urgents</button>
    <button class="quick-btn" onclick="quickAsk('Quel est mon planning aujourd\'hui ?')">📅 Planning</button>
    <button class="quick-btn" onclick="quickAsk('Y a-t-il des chantiers à risque en ce moment ?')">⚡ Chantiers</button>
    <button class="quick-btn" onclick="quickAsk('Fais-moi un point sur la semaine')">📊 Point semaine</button>
    <button class="quick-btn" onclick="quickAsk('Quelles sont les relances à faire ?')">🔔 Relances</button>
</div>

<div class="messages" id="messages">
    <div class="message aria">Bonjour Guillaume 👋

Je suis Aria, votre assistante Couffrant Solar.

Je surveille vos mails, vos chantiers et votre activité. Posez-moi n'importe quelle question ou donnez-moi un ordre — je suis là pour vous faire gagner du temps.</div>
</div>

<button class="stop-btn" id="stopBtn" onclick="stopSpeech()">⏹</button>

<div class="input-area">
    <div class="input-wrap">
        <textarea id="input" placeholder="Posez une question à Aria..." rows="1"
            onkeydown="handleKey(event)"
            oninput="autoResize(this)"></textarea>
        <button class="btn-mic" id="micBtn" onclick="toggleMic()" title="Dicter">🎤</button>
    </div>
    <button class="btn-send" id="sendBtn" onclick="sendMessage()">➤</button>
</div>

<script>
const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');
const micBtn = document.getElementById('micBtn');
const stopBtn = document.getElementById('stopBtn');

let recognition = null;
let isListening = false;
let currentAudio = null;

function speak(text) {
    stopSpeech();
    stopBtn.classList.add('visible');

    fetch('/speak', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text: text })
    })
    .then(r => {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.blob();
    })
    .then(blob => {
        if (blob.size < 100) {
            stopBtn.classList.remove('visible');
            return;
        }
        const url = URL.createObjectURL(blob);
        currentAudio = new Audio(url);
        currentAudio.oncanplaythrough = () => {
            currentAudio.play().catch(() => stopBtn.classList.remove('visible'));
        };
        currentAudio.onended = () => stopBtn.classList.remove('visible');
        currentAudio.onerror = () => stopBtn.classList.remove('visible');
    })
    .catch(() => stopBtn.classList.remove('visible'));
}

function stopSpeech() {
    window.speechSynthesis.cancel();
    if (currentAudio) {
        currentAudio.pause();
        currentAudio = null;
    }
    stopBtn.classList.remove('visible');
}

function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
    }
}

function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
}

function cleanText(text) {
    return text
        .replace(/#{1,6}\s+/g, '')
        .replace(/\*\*(.*?)\*\*/g, '$1')
        .replace(/\*(.*?)\*/g, '$1')
        .replace(/`(.*?)`/g, '$1')
        .replace(/---+/g, '')
        .replace(/\|.*?\|/g, '')
        .replace(/^\s*[-•]\s/gm, '')
        .replace(/\[([^\]]+)\]\([^\)]+\)/g, '$1')
        .replace(/\n{3,}/g, '\n\n')
        .trim();
}

function addMessage(text, type) {
    const div = document.createElement('div');
    div.className = `message ${type}`;

    const content = document.createElement('span');
    content.style.display = 'block';
    content.textContent = type === 'aria' ? cleanText(text) : text;
    div.appendChild(content);

    if (type === 'aria') {
        const speakBtn = document.createElement('button');
        speakBtn.className = 'speak-btn';
        speakBtn.textContent = '🔊 Écouter';
        speakBtn.onclick = () => speak(text);
        div.appendChild(speakBtn);
    }

    messagesEl.appendChild(div);
    scrollToBottom();
    return div;
}

function addLoading() {
    const div = document.createElement('div');
    div.className = 'message loading';
    div.innerHTML = '<div class="dots"><span>•</span><span>•</span><span>•</span></div>';
    messagesEl.appendChild(div);
    scrollToBottom();
    return div;
}

async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;

    inputEl.value = '';
    inputEl.style.height = 'auto';
    sendBtn.disabled = true;

    addMessage(text, 'user');
    const loading = addLoading();

    try {
        const response = await fetch('/aria', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ query: text })
        });
        const data = await response.json();
        loading.remove();
        addMessage(data.answer, 'aria');
        speak(data.answer);
    } catch (err) {
        loading.remove();
        addMessage("Erreur de connexion à Aria. Réessayez.", 'aria');
    }

    sendBtn.disabled = false;
}

function quickAsk(text) {
    inputEl.value = text;
    sendMessage();
}

function toggleMic() {
    if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
        alert('Utilisez Safari sur iPhone pour la dictée vocale.');
        return;
    }

    if (isListening) {
        recognition.stop();
        return;
    }

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SpeechRecognition();
    recognition.lang = 'fr-FR';
    recognition.continuous = false;
    recognition.interimResults = false;

    recognition.onstart = () => {
        isListening = true;
        micBtn.classList.add('listening');
        micBtn.textContent = '⏹';
    };

    recognition.onresult = (e) => {
        const transcript = e.results[0][0].transcript;
        inputEl.value = transcript;
        autoResize(inputEl);
        sendMessage();
    };

    recognition.onend = () => {
        isListening = false;
        micBtn.classList.remove('listening');
        micBtn.textContent = '🎤';
    };

    recognition.start();
}
</script>

</body>
</html>
